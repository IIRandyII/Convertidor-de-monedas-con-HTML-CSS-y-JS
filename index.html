<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Conversor de Monedas</title>
</head>
<body>
    <div class="container">
        <h1>Conversor de Monedas</h1>
        <form id="currencyForm">
            <div class="form-group">
                <label for="amount">Cantidad en Pesos MX (MXN):</label>
                <input type="number" id="amount" placeholder="Introduce una cantidad" step="0.01">
            </div>
            
            <div class="form-group">
                <label for="currency">Moneda destino:</label>
                <select id="currency">
                    <option value="USD">Dólar estadounidense (USD)</option>
                    <option value="GBP">Libra esterlina (GBP)</option>
                    <option value="EUR">Euro (EUR)</option>
                </select>
            </div>
            
            <button type="submit" id="convertBtn">Convertir</button>
        </form>
        
        <div id="errorMessage" class="error hidden"></div>
        <div id="result" class="result hidden"></div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
